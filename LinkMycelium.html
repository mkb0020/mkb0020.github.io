<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MK | Links</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
/* Reset & Base */
* { margin: 0; padding: 0; box-sizing: border-box; }

body, html {
    min-height: 100vh; 
    height: 100%; 
    background: #170032;
    background: radial-gradient(circle at 50% 0%, #37025a 0%, #170032 70%);
    background-repeat: no-repeat; 
    background-attachment: fixed;
    font-family: 'GothNerd', 'Inter', sans-serif;
    color: #c4b5fd;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Custom Scrollbar on the Container */
.container::-webkit-scrollbar {
  width: 13px;
  height: 14px;
}

.container::-webkit-scrollbar-track {
  background: #0a0015;
  border: 1px solid #830cdea2;
  border-radius: 8px; 
  box-shadow: inset 0 0 12px #000000cc;
}

.container::-webkit-scrollbar-thumb {
  background: linear-gradient(
    145deg,
    #ff69b4 0%,
    #c71585 5%,
    #dc4ce8 10%,
    #830cde 15%,
    #00ffff 20%,
    #67FEBD 25%
  );
  border-radius: 8px;          
  border: 2px solid #000000;
  box-shadow:
    0 0 10px #000000,
    0 0 20px #000000,
    inset 0 0 6px #ffffff33;
  background-size: 300% 300%;    
  filter: hue-rotate(0deg);
  animation: 
    hueCycle 18s linear infinite,    
    neonFlow 8s ease-in-out infinite alternate; 
}

@keyframes hueCycle {
    0% { filter: hue-rotate(0deg); }
    100% { filter: hue-rotate(360deg); }
}

@keyframes neonFlow {
    0% { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
}

@font-face {
  font-family: 'GothNerd'; 
  src: url('assets/fonts/ScienceGothic.ttf') format('truetype'); 
}

@font-face {
  font-family: 'SpaceLetters'; 
  src: url('assets/fonts/Orbitron-Bold.ttf') format('truetype'); 
}

/* Cyber Effects */
.scanlines {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.15) 50%, rgba(0,0,0,0.15));
    background-size: 100% 4px;
    pointer-events: none;
    z-index: 9999;
}

.cyber-grid {
    position: fixed;
    bottom: 0; left: 0; width: 100%; height: 50vh;
    background-image: 
        linear-gradient(transparent 65%, rgba(165, 90, 255, 0.4) 66%, rgba(165, 90, 255, 0.6) 100%),
        linear-gradient(90deg, transparent 24%, rgba(0, 255, 255, 0.15) 25%, transparent 26%, transparent 74%, rgba(0, 255, 255, 0.15) 75%, transparent 76%);
    background-size: 100% 30px, 40px 100%;
    transform: perspective(400px) rotateX(60deg);
    transform-origin: bottom;
    z-index: -2;
    opacity: 0.6;
}

/* Starfield */
#stars {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: -1;
}

.star {
    position: absolute;
    background: #FFC7FF;
    border-radius: 50%;
    box-shadow: 0 0 8px #A55AFF;
    animation: twinkle 4s infinite;
}

@keyframes twinkle {
    0%,100% { opacity: 0.2; transform: scale(0.8); }
    50%     { opacity: 1; transform: scale(1.2); }
}

#star-bounds {
    position: fixed;
    top: 0;
    left: 50%; 
    transform: translateX(-50%);
    width: 100%;
    max-width: 420px;
    height: 100vh;
    overflow: hidden;
    pointer-events: none;
    z-index: 1;
}

.shooting-star {
  position: absolute;
  top: 10%;
  left: 20%;
  width: 120px;
  height: 2px;
  background: linear-gradient(90deg, #00ffff, transparent);
  box-shadow: 0 0 10px #00ffff;
  opacity: 0;
  transform: rotate(75deg) translateX(-150px); 
  animation: shoot 1s ease-out forwards;
}

@keyframes shoot {
  0% { transform: rotate(75deg) translateX(-150px); opacity: 0; }
  10% { opacity: 0.8; }
  90% { opacity: 0.8; }
  100% { transform: rotate(75deg) translateX(150vh); opacity: 0; }
}

/* Character Background Layer */
.bg-character {
    position: fixed;
    top: 80px;
    bottom: 10px;
    right: 0;
    height: calc(100vh - 70px);
    z-index: 2;
    pointer-events: none;
    display: flex;
    justify-content: flex-end;
    opacity: 0.8;
}

.bg-character img {
    height: 100%;
    width: auto;
    object-fit: contain;
}

/* Navbar */
.navbar {
  position: fixed;
  top: 0;
  width: 100vw;
  background: rgba(23, 0, 50, 0.7);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid #830cde;
  box-shadow: 0 4px 20px rgba(131, 12, 222, 0.3);
  z-index: 1000;
}

.nav-container {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 50px;
}

.logo {
  font-size: 1.4rem;
  color: #00ffff;
  font-family: 'SpaceLetters', sans-serif;
  text-transform: uppercase;
  text-shadow: 0 0 10px rgba(103, 254, 189, 0.6);
  letter-spacing: 2px;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo a { text-decoration: none; color: inherit; }

/* Main Container */
.container {
  width: 100%;
  max-width: 420px;
  height: calc(100vh - 50px); /* full viewport minus navbar */
  overflow-y: auto;
  padding: 30px 16px 40px;
  display: flex;
  flex-direction: column;
  z-index: 10;
  margin-top: 50px;
}

/* Profile Header */
.profile {
  text-align: center;
  margin-bottom: 30px;
  display: flex; 
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative; 
  padding: 20px 0; 
}

.avatar {
  width: 35px;
  height: auto;
  border: none; 
  box-shadow: none; 
  clip-path: none; 
  object-fit: cover;
  z-index: 2; 
}

/* Links List */
.links {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* Cyberpunk Buttons */
.link {
    text-decoration: none;
    position: relative;
    background: rgba(54, 0, 115, 0.386);
    border: 1px solid #764ba2;
    border-left: 4px solid #A55AFF; 
    padding: 1rem 1.2rem;
    font-family: 'SpaceLetters', sans-serif;
    color: #00FFFF;
    font-size: 0.8rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    display: flex;
    justify-content: left;
    align-items: center;
    transition: all 0.2s ease-in-out;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(5px);
    clip-path: polygon(0 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%);
    -webkit-tap-highlight-color: transparent;
}

.link::before {
    content: '>>';
    position: absolute;
    left: 15px;
    color: #67FEBD;
    opacity: 0;
    transition: 0.2s ease;
}

.link:hover, .link:focus, .link.clicked {
    background: rgba(55, 2, 90, 0.9);
    border-color: #ff69b4;
    border-left-color: #00ffff;
    color: #00ffff;
    box-shadow: 0 0 15px rgba(0, 255, 255, 0.3), inset 0 0 10px rgba(0, 255, 255, 0.1);
    transform: translateX(5px);
    outline: none;
}

.link:hover::before, .link:focus::before, .link.clicked::before {
    opacity: 1;
}

/* Icon Grids */
.icon-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
  margin-top: 20px;
}

.icon-tile {
    background: rgba(54, 0, 115, 0.386);
    border: 1px solid #764ba2;
    border-bottom: 3px solid #A55AFF;
    cursor: pointer;
    transition: all 0.2s ease-in-out;
    display: flex;
    align-items: center;
    justify-content: center;
    aspect-ratio: 1 / 1;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(5px);
    clip-path: polygon(0 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%);
    -webkit-tap-highlight-color: transparent;
}

.icon-tile img {
  width: 45%;
  height: 45%;
  object-fit: contain;
  transition: transform 0.2s ease-in-out;
  filter: brightness(0) saturate(100%) invert(84%) sepia(97%) saturate(3966%) hue-rotate(130deg);
}

.icon-tile:hover, .icon-tile:focus, .icon-tile.clicked {
    background: rgba(55, 2, 90, 0.9);
    border-color: #ff69b4;
    border-bottom-color: #00ffff;
    box-shadow: 0 0 15px rgba(0, 255, 255, 0.3), inset 0 0 10px rgba(0, 255, 255, 0.1);
    transform: translateY(-5px);
    outline: none;
}

.icon-tile:hover img, .icon-tile:focus img {
    transform: scale(1.1);
}
</style>
</head>
<body>

  <div class="scanlines"></div>
  <div class="cyber-grid"></div>
  <div id="stars"></div>

  <div class="bg-character">
      <img src="assets/images/nova.png" alt="Nova Background Artwork" />
  </div>

  <nav class="navbar">
    <div class="nav-container">
       <a href="https://mkb0020.github.io" class="logo">
            <img src="assets/images/cowboyNiels.png" alt="MK avatar" class="avatar" /> mkb0020
        </a>
    </div>
  </nav>

  <div id="star-bounds"></div>

  <main class="container">

    <section class="links">
      <a class="link" href="https://mkb0020.itch.io/wormholes">Wormholes All The Way Down</a>
      <a class="link" href="https://itch.io/c/7665254/context-kit">Context Kit</a>
      <a class="link" href="https://mkb0020.itch.io/meowmix-radio">meowMIX Radio</a>
      <a class="link" href="https://mkb0020.itch.io/first-ca">My First Cellular Automata</a>
      <a class="link" href="https://mkb0020.itch.io/branchforge">BranchForge</a>
      <a class="link" href="https://mkb0020.itch.io/prism-crawl">Play Prism Crawl</a>
      <a class="link" href="https://mkb0020.itch.io/vibe-garden">Vibe Garden</a>
      <a class="link" href="https://mkb0020.itch.io/moonwalkerranch">Play MOOnwalker Ranch</a>
    </section>

    <section class="icon-grid">
      <a href="https://mkb0020.itch.io/" class="icon-tile" target="_blank">
        <img src="assets/images/itchio-icon.png" alt="Itch.io" />
      </a>
      <a href="https://www.instagram.com/lil.bear.kate/" class="icon-tile" target="_blank">
        <img src="assets/images/Insta.png" alt="Instagram" />
      </a>
      <a href="https://www.cash.app/$mkb0020" class="icon-tile" target="_blank">
        <img src="assets/images/cash-app.png" alt="Cash App" />
      </a>
      <a href="https://soundcloud.com/mkb0020" class="icon-tile" target="_blank">
        <img src="assets/images/Soundcloud.png" alt="Soundcloud" />
      </a>
    </section>

    <section class="icon-grid" style="margin-top: 15px;">
      <a href="https://www.tiktok.com/@lil.bear.kate" class="icon-tile" target="_blank">
        <img src="assets/images/tiktok-icon.png" alt="TikTok" />
      </a>
      <a href="https://x.com/home" class="icon-tile" target="_blank">
        <img src="assets/images/x-icon.png" alt="X (Twitter)" />
      </a>
      <a href="https://www.youtube.com/@mkb0020" class="icon-tile" target="_blank">
        <img src="assets/images/youtube-icon.png" alt="YouTube" />
      </a>
      <a href="https://github.com/mkb0020" class="icon-tile" target="_blank">
        <img src="assets/images/github-icon.png" alt="GitHub" />
      </a>
    </section>

    <footer class="socials"></footer>
  </main>

  <script>
    const starsDiv = document.getElementById('stars');
    const colors = ['#00ffff', '#A55AFF', '#FFC7FF']; 
    for (let i = 0; i < 150; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.width = star.style.height = Math.random() * 2.5 + 'px';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.background = colors[Math.floor(Math.random() * colors.length)];
        star.style.animationDelay = Math.random() * 4 + 's';
        starsDiv.appendChild(star);
    }

    const starBounds = document.getElementById('star-bounds');
    setInterval(() => {
      if (Math.random() < 0.4) {
        const star = document.createElement('div');
        star.className = 'shooting-star';
        starBounds.appendChild(star);
        setTimeout(() => star.remove(), 1000);
      }
    }, 6000);

    document.querySelectorAll('.link, .icon-tile').forEach(link => {
      link.addEventListener('click', () => {
        link.classList.add('clicked');
        setTimeout(() => link.classList.remove('clicked'), 150);
      });
    });
  </script>
</body>
</html>
