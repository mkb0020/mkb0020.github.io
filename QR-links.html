<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Links</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

@font-face {
  font-family: 'GothNerd'; 
  src: url('assets/fonts/ScienceGothic.ttf') format('truetype'); 
}

@font-face {
  font-family: 'SpaceLetters'; 
  src: url('assets/fonts/Orbitron-Bold.ttf') format('truetype'); 
}



#stars {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -1;
        }
.star {
            position: absolute;
            background: #FFC7FF;
            border-radius: 50%;
            box-shadow: 0 0 10px #fff;
            animation: twinkle 4s infinite;
        }
@keyframes twinkle {
            0%,100% { opacity: 0.4; transform: scale(1); }
            50%     { opacity: 1; transform: scale(1.4); }
        }

.shooting-star {
  position: fixed;
  top: -10px;
  left: -30%;
  width: 150px;
  height: 2px;
  background: linear-gradient(90deg, #fff, transparent);
  opacity: 0.8;
  transform: rotate(30deg);
  pointer-events: none;
  z-index: -1;
  animation: shoot 1.2s ease-out forwards;
}

@keyframes shoot {
  to {
    transform: translate(160vw, 90vh) rotate(30deg);
    opacity: 0;
  }
}


.navbar {
  position: fixed;
  top: 0;
  width: 100vw;
  background: linear-gradient(135deg, rgba(80, 1, 133, 0.55) 0%, rgba(79, 4, 149, 0.35) 50%, rgba(55, 2, 90, 0.409) 100%);
  backdrop-filter: blur(50px);
  border-bottom: 1px solid #8a2be2;
  z-index: 1000;
  padding: 0.5rem 0;
}


.nav-container {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 0.5rem;
  padding-bottom:  1rem;
  padding-right: 1rem;
  padding-left: 1rem;
  height: 30px;
  max-height:30px;
}

.logo {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  font-size: 1.7rem;
  color:#67FEBD;
  font-family: 'SpaceLetters';
  z-index: 10000;
  flex-shrink: 0;
}

* {
  box-sizing: border-box;
}

body {

  display: flex;
  justify-content: center;
}



body {
      margin: 0;
      min-height: 100vh;
      background: transparent;
      font-family: 'GothNerd', sans-serif;
      color: white;
      position: relative;
      overflow-x: hidden;
      
  display: flex;
  justify-content: center;
    }

    .background-gradient {
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, #190039, #3f017a, #c71585);
      opacity: 0.85;
      z-index: -3;
    }

    .waves {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      pointer-events: none;
      z-index: -2;
    }

    svg {
      position: absolute;
      bottom: 0;
      width: 800%;
      height: 90vh;
      animation: wave-scroll linear infinite;
    }

    #wave1 { animation-duration: 80s; }
    #wave2 { animation-duration: 70s; }
    #wave3 { animation-duration: 60s; }
    #wave4 { animation-duration: 90s; animation-direction: reverse; }
    #wave5 { animation-duration: 60s; }
    #wave6 { animation-duration: 65s; animation-direction: reverse; }

    @keyframes wave-scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-66.66%); }
    }

    .dreamy-overlay {
      position: fixed;
      inset: 0;
      background: rgba(43, 0, 107, 0.237);
      backdrop-filter: blur(10px);
      pointer-events: none;
      z-index: -1;
    }

.top-glow {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 45vh;
  background: radial-gradient(
    ellipse at top,
    rgba(117, 14, 185, 0.55) 0%,
    rgba(89, 17, 156, 0.35) 35%,
    rgba(143, 1, 237, 0.486) 60%,
    transparent 75%
  );
  z-index: -2;
  pointer-events: none;
}



.container {
  width: 100%;
  max-width: 420px;
  padding: 24px 16px 40px;
}

.profile {
  text-align: center;
  margin-bottom: 10px;
  z-index:100;
}

.avatar {
  width: 90px;
  height: 90px;
  margin-bottom: 0px;
  margin-top: 0px;
  z-index:10;
}




.links {
  display: flex;
  flex-direction: column;
  gap: 10px;
}





.link {
  color: #ffffff;
  background: rgba(255, 255, 255, 0.178);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.253);
  border-radius: 24px;
  font-family: 'GothNerd', sans-serif;
  font-size: 1rem;
  padding: 5px 30px;
  border-radius: 30px;
  cursor: pointer;
  transition: all 0.3s;
  display: block;
  box-shadow: 
    0 4px 8px 0 rgba(0, 255, 255, 0.7),
    inset 0 2px 0 rgba(255, 255, 255, 0.194);
  justify-content: center;
  text-align: center;
  text-transform: uppercase;
  margin: 5px;
  text-decoration: none;
}

.link:hover {
  box-shadow: 0 0 20px #c4b5fd;
}

.icon-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  margin-top: 15px;
}

.icon-tile {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 24px;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  aspect-ratio: 1 / 1;
  box-shadow: 
    0 4px 8px 0 rgba(0, 255, 255, 0.7),
    inset 0 2px 0 rgba(255, 255, 255, 0.194);
  overflow: hidden;
}

.icon-tile:hover {
  box-shadow: 0 0 20px #c4b5fd;
  transform: scale(1.05);
}

.icon-tile img {
  width: 70%;
  height: 70%;
  object-fit: contain;
}

</style>

</head>

<body>
    <div class="dreamy-overlay"></div>

  <div id="stars"></div>

 <main class="container">

    <div class="background-gradient"></div>
    <div class="waves">
      <svg id="wave1" viewBox="0 0 3000 600" preserveAspectRatio="none">
        <path d="M0,350 Q500,150 1000,350 T2000,350 T3000,350 L3000,600 L0,600 Z" fill="#4b0082" opacity="0.9"/>
      </svg>
      <svg id="wave2" viewBox="0 0 3000 600" preserveAspectRatio="none">
        <path d="M0,380 Q500,200 1000,380 T2000,380 T3000,380 L3000,600 L0,600 Z" fill="#c71585" opacity="0.6"/>
      </svg>
      <svg id="wave4" viewBox="0 0 3000 600" preserveAspectRatio="none">
        <path d="M0,420 Q750,250 1500,420 T3000,420 L3000,600 L0,600 Z" fill="#db7093" opacity="0.5"/>
      </svg>
      <svg id="wave5" viewBox="0 0 3000 600" preserveAspectRatio="none">
        <path d="M0,300 Q250,150 500,300 T1000,300 T1500,300 T2000,300 T2500,300 T3000,300 L3000,600 L0,600 Z" fill="#ff69b4" opacity="0.5"/>
      </svg>
      <<svg id="wave6" viewBox="0 0 3000 600" preserveAspectRatio="none">
        <path d="M0,250 Q600,100 1200,250 T2400,250 L3000,250 L3000,600 L0,600 Z" fill="#c71585" opacity="0.4"/>
      </svg>
    </div>


 

    <header class="profile">
      <img src="assets/images/cowboyNiels.png" alt="MK avatar" class="avatar" />

    </header>

    <section class="links">
      <a class="link" href="https://mkb0020.vercel.app/">Website</a>
      <a class="link" href="https://mkb0020.itch.io/wormholes" style="font-size: 0.9rem">Wormholes All The Way Down</a>
      <a class="link" href="https://mkb0020.itch.io/prism-crawl">Prism Crawl</a>
      <a class="link" href="https://mkb0020.itch.io/vibe-garden">Vibe Garden</a>


    </section>

    <!-- NEW 2x2 ICON TILES (exactly as requested) -->
    <section class="icon-grid">
      <a href="https://mkb0020.itch.io/" class="icon-tile" target="_blank">
        <img src="assets/images/itchio-icon.png" alt="Itch.io" />
      </a>
      <a href="https://www.instagram.com/lil.bear.kate/" class="icon-tile" target="_blank">
        <img src="assets/images/Insta.png" alt="Instagram" />
      </a>
      <a href="https://www.cash.app/$mkb0020" class="icon-tile" target="_blank">
        <img src="assets/images/cash-app.png" alt="Cash App" />
      </a>
      <a href="https://soundcloud.com/mkb0020" class="icon-tile" target="_blank">
        <img src="assets/images/Soundcloud.png" alt="Soundcloud" />
      </a>
    </section>

    <footer class="socials">

    </footer>


  </main>


  <script>
        const starsDiv = document.getElementById('stars');
        for (let i = 0; i < 200; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = star.style.height = Math.random() * 2 + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 4 + 's';
            starsDiv.appendChild(star);
        }
  </script>

</script>


  <script>

document.querySelectorAll('.link').forEach(link => {
  link.addEventListener('click', () => {
    link.classList.add('clicked');
    setTimeout(() => link.classList.remove('clicked'), 150);
  });
});

  </script>
</body>
</html>
