  <div class="container">
    <h1>Price Calculator</h1>

    <!-- DOWNLOAD -->
    <button id="downloadBtn">Download Template</button>

    <!-- UPLOAD -->
    <div class="drop-zone" id="dropZone">
        <div class="drop-zone-content">
            <svg class="upload-icon" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
            <p class="drop-text">Drag & drop your file here</p>
            <p class="or-text">or</p>
            <label for="fileInput" class="upload-btn">
            <span>Choose File</span>
            </label>
        </div>
        <input type="file" id="fileInput" />
    </div>

  </div>


    <div id="kofi-float">
        <a href="https://ko-fi.com/mkb0020" target="_blank" rel="noopener noreferrer">
            <img src="assets/images/tipjar.png" alt="Support me on Ko-fi">
            <div class="hearts">
                <div class="heart" style="--delay: 0s; --drift: -20px;">❤️</div>
                <div class="heart" style="--delay: 0.5s; --drift: 15px;">💖</div>
                <div class="heart" style="--delay: 1s; --drift: -10px;">💕</div>
                <div class="heart" style="--delay: 1.5s; --drift: 20px;">❤️</div>
                <div class="heart" style="--delay: 2s; --drift: -15px;">💗</div>
                <div class="heart" style="--delay: 2.5s; --drift: 10px;">💖</div>
            </div>
        </a>
    </div>


    <div id="scroll-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'});">
            <a href="javascript:void(0);" class="button-container" aria-label="Scroll to top">
                <img src="assets/images/top.png" alt="Scroll to top">
    
            </a>
        </div>

    <div id="helpModal" class="modal">
        <div class="modal-content">
        <div class="modal-header">
            <h1 class="modal-title">How to use</h1>
            <button class="modal-close" id="closeModal">X</button>
        </div>
        <div class="modal-body">
            <h3>How to use</h3>

    
        </div>
        </div>
    </div>

    <div id="configModal" class="config-modal hidden">
        <div class="config-modal-content">
            <h2>Pricing Settings</h2>

            <label>Pricing Type:</label>
            <select id="pricingType">
            <option value="markup">Markup %</option>
            <option value="margin">Margin %</option>
            <option value="holdback">Holdback %</option>
            </select>

            <label>Value (%):</label>
            <input type="number" id="pricingValue" placeholder="Enter %" />

            <label>Output File Name:</label>
            <input type="text" id="fileName" placeholder="Quote_12345.xlsx" />

            <button id="runCalc">Run Calculation</button>
        </div>
    </div>

  <div id="stars"></div>
  <script src="js/KittyCore.js"></script>

  <script>
        const button = document.getElementById('kofi-float');
        button.addEventListener('mouseenter', () => {
            document.querySelectorAll('.heart').forEach(h => {
                h.style.animation = 'none';
                h.offsetHeight; 
                h.style.animation = null;
            });
        });
    </script>

  <script>
        const starsDiv = document.getElementById('stars');
        for (let i = 0; i < 200; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = star.style.height = Math.random() * 2 + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 4 + 's';
            starsDiv.appendChild(star);
        }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style/dist/xlsx.bundle.js"></script>
  <script src="js/calculator.js"></script>
</body>
</html>
